<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consultation Saved</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  {% set header_subtitle = "Consultation saved successfully" %}
  {% include "_header.html" %}

  <main>
    <div class="result">
      <p>Consultation submitted successfully.</p>
      <h2>Consultation ID: {{ consultation_id }}</h2>
      <p>Day: {{ consultation_day }}</p>
    </div>

    <div class="tabs">
      <a class="tab" href="{{ url_for('home') }}">Home</a>
      <a class="tab" href="{{ url_for('start_consultation') }}">Start New Consultation</a>
      <a class="tab" href="{{ url_for('past_consultation') }}">View Past Consultation</a>
      
    </div>
  </main>
</body>
</html>
